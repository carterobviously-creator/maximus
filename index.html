<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maximus Lite</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#08080c;--bg2:#0e0e16;--bg3:#12121c;--brd:#1a1a2e;--brd2:#252540;--tx:#c8c8d0;--tx2:#666;--tx3:#444;--ac:#00ffaa;--ac2:rgba(0,255,170,.12);--red:#ff4455;--warn:#ffaa00}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
::selection{background:var(--ac);color:var(--bg)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:3px}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 2rem;border-bottom:1px solid var(--brd);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10;background:rgba(8,8,12,.85)}
.logo{font-size:1.2rem;font-weight:800;letter-spacing:3px;color:var(--ac);text-shadow:0 0 20px rgba(0,255,170,.3)}
.badge{display:flex;align-items:center;gap:.5rem;font-size:.72rem;color:var(--tx2);text-transform:uppercase;letter-spacing:1px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--tx3);flex-shrink:0;transition:background .3s}
.dot.on{background:var(--ac);box-shadow:0 0 8px var(--ac)}.dot.load{background:var(--warn);animation:pulse 1s infinite}.dot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.main{max-width:720px;margin:0 auto;padding:1.5rem 1.5rem 4rem}
.card{background:var(--bg2);border:1px solid var(--brd);border-radius:10px;padding:1.4rem;margin-bottom:1.2rem;transition:border-color .2s}.card:hover{border-color:var(--brd2)}
.lbl{font-size:.65rem;text-transform:uppercase;letter-spacing:2px;color:var(--tx3);margin-bottom:.7rem;font-weight:600}
.prompt{width:100%;background:var(--bg3);border:1px solid var(--brd2);border-radius:8px;padding:.75rem 1rem;color:var(--tx);font-size:.95rem;outline:none;transition:border-color .2s;font-family:inherit}
.prompt:focus{border-color:var(--ac);box-shadow:0 0 0 2px var(--ac2)}.prompt::placeholder{color:var(--tx3)}
.pills{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.2rem}
.pill{background:var(--bg3);border:1px solid var(--brd2);border-radius:20px;padding:.35rem .8rem;font-size:.75rem;color:var(--tx2);cursor:pointer;transition:all .15s;user-select:none}
.pill:hover{border-color:var(--ac);color:var(--ac)}.pill.on{background:var(--ac2);border-color:var(--ac);color:var(--ac);font-weight:600}
.dur-row{display:flex;align-items:center;gap:.6rem;margin-top:.3rem}
.dur-input{width:70px;background:var(--bg3);border:1px solid var(--brd2);border-radius:8px;padding:.5rem .7rem;color:var(--ac);font-size:.95rem;font-weight:600;text-align:center;outline:none;font-family:inherit;font-variant-numeric:tabular-nums;transition:border-color .2s}
.dur-input:focus{border-color:var(--ac);box-shadow:0 0 0 2px var(--ac2)}
.dur-input::-webkit-inner-spin-button,.dur-input::-webkit-outer-spin-button{opacity:1}
.dur-hint{font-size:.72rem;color:var(--tx3)}
.backend-tag{display:inline-block;padding:.15rem .5rem;border-radius:4px;font-size:.65rem;font-weight:600;letter-spacing:1px;margin-left:.5rem}
.backend-tag.gpu{background:rgba(0,255,170,.15);color:var(--ac)}.backend-tag.cpu{background:rgba(255,170,0,.15);color:var(--warn)}
.btn-gen{width:100%;padding:.85rem;background:linear-gradient(135deg,#00ffaa,#00cc88);border:none;border-radius:8px;color:var(--bg);font-size:.95rem;font-weight:700;letter-spacing:1.5px;cursor:pointer;margin-top:1rem;transition:all .15s;text-transform:uppercase}
.btn-gen:hover{box-shadow:0 4px 24px rgba(0,255,170,.25);transform:translateY(-1px)}.btn-gen:disabled{opacity:.35;cursor:wait;transform:none;box-shadow:none}
.btn-sm{background:var(--bg3);border:1px solid var(--brd2);border-radius:6px;padding:.45rem .9rem;color:var(--tx2);font-size:.75rem;cursor:pointer;transition:all .15s;font-family:inherit}.btn-sm:hover{border-color:var(--ac);color:var(--ac)}.btn-ac{border-color:var(--ac);color:var(--ac)}
.prog-wrap{display:none;margin-top:1rem}.prog-track{height:3px;background:var(--brd2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--ac);border-radius:2px;width:0%;transition:width .3s;box-shadow:0 0 8px var(--ac)}.prog-fill.pulse{animation:barPulse 1.5s ease-in-out infinite}
@keyframes barPulse{0%{opacity:1}50%{opacity:.5}100%{opacity:1}}
.prog-txt{font-size:.72rem;color:var(--tx3);margin-top:.5rem;font-variant-numeric:tabular-nums}
.player{display:none}.wave-wrap{background:var(--bg3);border-radius:8px;overflow:hidden;position:relative;cursor:pointer}
.wave-canvas{width:100%;height:72px;display:block}.wave-cursor{position:absolute;top:0;left:0;width:2px;height:100%;background:var(--ac);box-shadow:0 0 6px var(--ac);pointer-events:none;transition:left .05s linear}
.p-row{display:flex;align-items:center;gap:.8rem;margin-top:.8rem}
.p-play{width:36px;height:36px;border-radius:50%;background:var(--ac);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;color:var(--bg);transition:box-shadow .15s;flex-shrink:0}.p-play:hover{box-shadow:0 0 16px rgba(0,255,170,.4)}
.p-time{font-size:.78rem;color:var(--tx2);font-variant-numeric:tabular-nums;min-width:90px}.p-actions{margin-left:auto;display:flex;gap:.5rem}
.lib{display:none}.clips{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.6rem;margin-top:.3rem}
.clip{background:var(--bg3);border:1px solid var(--brd2);border-radius:8px;padding:.7rem;cursor:pointer;transition:all .15s;position:relative}.clip:hover{border-color:var(--ac)}
.clip-name{font-size:.78rem;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.clip-dur{font-size:.65rem;color:var(--tx3);margin-top:.2rem}
.clip-del{position:absolute;top:4px;right:6px;background:none;border:none;color:var(--tx3);cursor:pointer;font-size:.7rem;padding:2px}.clip-del:hover{color:var(--red)}
.stitch-row{display:flex;gap:.6rem;margin-top:1rem}.stitch-row .btn-sm{flex:1;text-align:center;padding:.6rem}
.status{font-size:.72rem;color:var(--tx3);text-align:center;margin-top:.8rem}
@media(max-width:600px){.main{padding:1rem}.hdr{padding:1rem}.card{padding:1rem}.clips{grid-template-columns:repeat(auto-fill,minmax(100px,1fr))}}
</style>
</head>
<body>
<header class="hdr"><div class="logo">⚡ MAXIMUS LITE</div><div class="badge"><span class="dot" id="dot"></span><span id="statusTxt">Idle</span><span class="backend-tag" id="backendTag" style="display:none"></span></div></header>
<main class="main">
<div class="card">
<div class="lbl">Prompt</div>
<input class="prompt" id="prompt" type="text" placeholder="heavy dnb with amen breaks and reese bass" spellcheck="false"/>
<div class="lbl" style="margin-top:1.1rem">Genre</div><div class="pills" id="pills"></div>
<div class="lbl" style="margin-top:1.1rem">Duration (seconds)</div>
<div class="dur-row"><input class="dur-input" id="dur" type="number" min="5" max="30" value="15" step="1"/><span class="dur-hint">5 – 30s</span></div>
<button class="btn-gen" id="genBtn">Generate</button>
<div class="prog-wrap" id="progWrap"><div class="prog-track"><div class="prog-fill" id="progFill"></div></div><div class="prog-txt" id="progTxt">Preparing...</div></div>
</div>
<div class="card player" id="playerCard">
<div class="lbl">Now Playing</div>
<div class="wave-wrap" id="waveWrap"><canvas class="wave-canvas" id="waveCanvas"></canvas><div class="wave-cursor" id="waveCursor"></div></div>
<div class="p-row"><button class="p-play" id="playBtn">▶</button><span class="p-time" id="pTime">0:00 / 0:00</span><div class="p-actions"><button class="btn-sm" id="saveBtn">+ Save</button><button class="btn-sm btn-ac" id="dlBtn">↓ WAV</button></div></div>
</div>
<div class="card lib" id="libCard">
<div class="lbl">Clip Library <span id="clipCount"></span></div><div class="clips" id="clipsGrid"></div>
<div class="stitch-row" id="stitchRow" style="display:none"><button class="btn-sm btn-ac" id="stitchBtn">Stitch → Full Track</button><button class="btn-sm" id="dlStitchBtn">↓ Download Stitched</button></div>
</div>
<div class="status" id="footStatus">Model loads on first generate (~460 MB, cached after first download).</div>
</main>

<script>
if (navigator.storage && navigator.storage.persist) {
  navigator.storage.persist().then(ok => {
    console.log(ok ? 'Storage: persistent' : 'Storage: best-effort');
  });
}

const GENRES = {
  'DnB': 'drum and bass, fast breakbeats, 174 bpm, heavy sub bass, reese bass, amen break, energetic electronic',
  'Lo-Fi': 'lo-fi hip hop, chill beats, vinyl crackle, soft piano, jazzy chords, 85 bpm, mellow relaxing',
  'Techno': 'techno, four on the floor kick, 130 bpm, dark synthesizers, industrial, hypnotic repetitive',
  'House': 'house music, four on the floor, 124 bpm, funky bassline, piano chords, uplifting vocal',
  'Ambient': 'ambient electronic, atmospheric pads, slow textures, ethereal reverb, 70 bpm, peaceful',
  'Trap': 'trap beats, 808 sub bass, hi-hat rolls, snare rolls, 140 bpm, dark hard hitting',
  'Synthwave': 'synthwave, retro 80s synths, arpeggios, pulsing bass, neon, 110 bpm, cinematic',
  'Jazz': 'jazz, saxophone, piano trio, upright bass, brushed drums, swing, 120 bpm, smooth',
  'Metal': 'heavy metal, distorted electric guitar, double bass drums, aggressive, 160 bpm, powerful',
  'Funk': 'funk, slap bass, wah guitar, tight drums, groovy, 110 bpm, brass stabs',
  'Reggae': 'reggae, offbeat guitar, deep bass, 80 bpm, laid back, island vibes, dub',
  'Classical': 'classical orchestral, strings, woodwinds, brass, symphonic, dramatic, cinematic score'
};

let selGenre = null, worker = null, curAudio = null, curSR = 32000;
let actx = null, srcNode = null, playing = false, startedAt = 0, pausedAt = 0;
let clips = [], stitchedBuf = null, modelLoaded = false;

const $ = id => document.getElementById(id);

const pillBox = $('pills');
Object.keys(GENRES).forEach(name => {
  const p = document.createElement('button');
  p.className = 'pill'; p.textContent = name;
  p.onclick = () => {
    if (selGenre === name) { selGenre = null; p.classList.remove('on'); }
    else { document.querySelectorAll('.pill').forEach(x => x.classList.remove('on')); selGenre = name; p.classList.add('on'); }
  };
  pillBox.appendChild(p);
});

function getDuration() {
  let v = parseInt($('dur').value);
  if (isNaN(v) || v < 5) v = 5;
  if (v > 30) v = 30;
  $('dur').value = v;
  return v;
}

function enhance(raw) {
  let p = raw.trim();
  if (selGenre && GENRES[selGenre]) {
    p = GENRES[selGenre] + (p ? ', ' + p : '');
  } else {
    const lo = p.toLowerCase();
    const abbr = { 'dnb': 'DnB', 'drum and bass': 'DnB', 'lofi': 'Lo-Fi', 'lo fi': 'Lo-Fi', 'edm': 'House' };
    for (const [k, v] of Object.entries(abbr)) {
      if (lo.includes(k)) { p = p.replace(new RegExp(k, 'gi'), '') + ', ' + GENRES[v]; break; }
    }
    if (p === raw.trim()) {
      for (const [n, d] of Object.entries(GENRES)) {
        if (lo.includes(n.toLowerCase())) { p += ', ' + d; break; }
      }
    }
  }
  return p.replace(/,\s*,/g, ',').replace(/^[\s,]+|[\s,]+$/g, '') || 'electronic music, synth melody, drums, bass, 120 bpm';
}

function setStatus(cls, txt) {
  $('dot').className = 'dot' + (cls ? ' ' + cls : '');
  $('statusTxt').textContent = txt;
}
function showBackend(type) {
  const tag = $('backendTag');
  tag.style.display = 'inline-block';
  tag.className = 'backend-tag ' + (type === 'webgpu' ? 'gpu' : 'cpu');
  tag.textContent = type === 'webgpu' ? 'GPU' : 'CPU';
}
function showProg(msg, pct, pulsing) {
  $('progWrap').style.display = 'block';
  $('progTxt').textContent = msg;
  $('progFill').style.width = pct + '%';
  if (pulsing) $('progFill').classList.add('pulse');
  else $('progFill').classList.remove('pulse');
}
function hideProg() { $('progWrap').style.display = 'none'; $('progFill').classList.remove('pulse'); }

function createWorker() {
  const workerCode = `
let _tokenizer = null;
let _model = null;
let _backend = 'wasm';

self.onmessage = async function(e) {
  const msg = e.data;

  if (msg.type === 'init') {
    try {
      self.postMessage({ type: 'status', text: 'Loading Transformers.js...' });
      const T = await import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3');
      T.env.allowLocalModels = false;

      // Detect WebGPU
      let useWebGPU = false;
      try {
        if (typeof navigator !== 'undefined' && navigator.gpu) {
          const adapter = await navigator.gpu.requestAdapter();
          if (adapter) {
            useWebGPU = true;
            self.postMessage({ type: 'status', text: 'WebGPU detected — loading model on GPU...' });
          }
        }
      } catch (e) {
        useWebGPU = false;
      }

      _backend = useWebGPU ? 'webgpu' : 'wasm';
      self.postMessage({ type: 'backend', backend: _backend });

      if (!useWebGPU) {
        self.postMessage({ type: 'status', text: 'No WebGPU — loading model on CPU (slower)...' });
      }

      _tokenizer = await T.AutoTokenizer.from_pretrained('Xenova/musicgen-small');

      const loadConfig = useWebGPU
        ? {
            device: 'webgpu',
            dtype: {
              text_encoder: 'fp32',
              decoder_model_merged: 'fp32',
              encodec_decode: 'fp32',
            },
            progress_callback: (p) => {
              if (p.status === 'progress' && p.progress != null) {
                const file = p.file ? p.file.split('/').pop() : 'model';
                self.postMessage({ type: 'load-progress', file, pct: Math.round(p.progress) });
              }
            }
          }
        : {
            dtype: {
              text_encoder: 'q8',
              decoder_model_merged: 'q8',
              encodec_decode: 'fp32',
            },
            progress_callback: (p) => {
              if (p.status === 'progress' && p.progress != null) {
                const file = p.file ? p.file.split('/').pop() : 'model';
                self.postMessage({ type: 'load-progress', file, pct: Math.round(p.progress) });
              }
            }
          };

      try {
        _model = await T.MusicgenForConditionalGeneration.from_pretrained('Xenova/musicgen-small', loadConfig);
      } catch (gpuErr) {
        if (useWebGPU) {
          self.postMessage({ type: 'status', text: 'WebGPU load failed — falling back to CPU...' });
          _backend = 'wasm';
          self.postMessage({ type: 'backend', backend: 'wasm' });
          _model = await T.MusicgenForConditionalGeneration.from_pretrained('Xenova/musicgen-small', {
            dtype: {
              text_encoder: 'q8',
              decoder_model_merged: 'q8',
              encodec_decode: 'fp32',
            },
            progress_callback: (p) => {
              if (p.status === 'progress' && p.progress != null) {
                const file = p.file ? p.file.split('/').pop() : 'model';
                self.postMessage({ type: 'load-progress', file, pct: Math.round(p.progress) });
              }
            }
          });
        } else {
          throw gpuErr;
        }
      }

      const sr = _model.config.audio_encoder.sampling_rate;
      self.postMessage({ type: 'loaded', sr: sr });

    } catch (err) {
      self.postMessage({ type: 'error', text: 'Model load failed: ' + err.message });
    }
  }

  if (msg.type === 'generate') {
    try {
      if (!_tokenizer || !_model) {
        self.postMessage({ type: 'error', text: 'Model not loaded yet' });
        return;
      }

      self.postMessage({ type: 'status', text: 'Tokenizing prompt...' });
      const inputs = _tokenizer(msg.prompt);

      const speed = _backend === 'webgpu' ? '~20-40s' : '~1-3 min';
      self.postMessage({ type: 'status', text: 'Generating audio (' + speed + ')...' });
      self.postMessage({ type: 'gen-start' });

      const audioValues = await _model.generate({
        ...inputs,
        max_new_tokens: msg.maxTokens,
        do_sample: true,
        guidance_scale: 1,
      });

      const audioData = audioValues.data;
      const sr = _model.config.audio_encoder.sampling_rate;
      const copy = new Float32Array(audioData);
      self.postMessage({ type: 'audio', buffer: copy.buffer, sr: sr, length: copy.length }, [copy.buffer]);

    } catch (err) {
      self.postMessage({ type: 'error', text: 'Generation failed: ' + err.message });
    }
  }
};
`;
  const blob = new Blob([workerCode], { type: 'text/javascript' });
  return new Worker(URL.createObjectURL(blob), { type: 'module' });
}

let pendingPrompt = '';
let pendingTokens = 750;
let genTimer = null;
let genElapsed = 0;

function handleWorkerMsg(e) {
  const d = e.data;
  switch (d.type) {
    case 'status':
      showProg(d.text, 50, true);
      setStatus('load', 'Working...');
      break;
    case 'backend':
      showBackend(d.backend);
      break;
    case 'load-progress':
      showProg('Downloading ' + d.file + '... ' + d.pct + '%', Math.min(d.pct, 95), false);
      break;
    case 'loaded':
      modelLoaded = true;
      curSR = d.sr || 32000;
      setStatus('on', 'Model ready');
      showProg('Model loaded! Starting generation...', 100, false);
      worker.postMessage({ type: 'generate', prompt: pendingPrompt, maxTokens: pendingTokens });
      break;
    case 'gen-start':
      genElapsed = 0;
      if (genTimer) clearInterval(genTimer);
      genTimer = setInterval(() => {
        genElapsed++;
        const mins = Math.floor(genElapsed / 60);
        const secs = genElapsed % 60;
        const timeStr = mins > 0 ? mins + 'm ' + secs + 's' : secs + 's';
        showProg('Generating audio... ' + timeStr + ' elapsed', 50, true);
      }, 1000);
      break;
    case 'audio':
      if (genTimer) { clearInterval(genTimer); genTimer = null; }
      curAudio = new Float32Array(d.buffer);
      curSR = d.sr;
      hideProg();
      $('genBtn').disabled = false;
      setStatus('on', 'Ready');
      showPlayer();
      drawWave(curAudio);
      $('footStatus').textContent = 'Generated ' + (curAudio.length / curSR).toFixed(1) + 's of audio.';
      break;
    case 'error':
      if (genTimer) { clearInterval(genTimer); genTimer = null; }
      showProg('⚠ ' + d.text, 0, false);
      setStatus('err', 'Error');
      $('genBtn').disabled = false;
      break;
  }
}

$('genBtn').onclick = () => {
  $('genBtn').disabled = true;
  setStatus('load', 'Working...');
  showProg('Initializing...', 0, true);
  $('footStatus').textContent = '';

  pendingPrompt = enhance($('prompt').value);
  pendingTokens = getDuration() * 50;

  if (!worker) {
    worker = createWorker();
    worker.onmessage = handleWorkerMsg;
    worker.onerror = (err) => {
      showProg('⚠ Worker crashed: ' + err.message, 0, false);
      setStatus('err', 'Error');
      $('genBtn').disabled = false;
      worker = null;
      modelLoaded = false;
    };
    worker.postMessage({ type: 'init' });
  } else if (modelLoaded) {
    showProg('Generating...', 0, true);
    worker.postMessage({ type: 'generate', prompt: pendingPrompt, maxTokens: pendingTokens });
  } else {
    showProg('Model still loading, please wait...', 50, true);
  }
};

function getCtx() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  return actx;
}

function showPlayer() { $('playerCard').style.display = 'block'; stopAudio(); }

function stopAudio() {
  if (srcNode) { try { srcNode.stop(); } catch (e) {} srcNode = null; }
  playing = false; pausedAt = 0; startedAt = 0;
  $('playBtn').textContent = '▶';
  $('waveCursor').style.left = '0px';
}

$('playBtn').onclick = () => {
  if (!curAudio) return;
  if (playing) {
    pausedAt = getCtx().currentTime - startedAt;
    srcNode.stop(); srcNode = null;
    playing = false; $('playBtn').textContent = '▶';
  } else {
    const ctx = getCtx();
    const buf = ctx.createBuffer(1, curAudio.length, curSR);
    buf.getChannelData(0).set(curAudio);
    srcNode = ctx.createBufferSource();
    srcNode.buffer = buf;
    srcNode.connect(ctx.destination);
    srcNode.onended = () => { if (playing) stopAudio(); };
    startedAt = ctx.currentTime - pausedAt;
    srcNode.start(0, pausedAt);
    playing = true; $('playBtn').textContent = '❚❚';
    animCursor();
  }
};

function animCursor() {
  if (!playing) return;
  const el = getCtx().currentTime - startedAt;
  const dur = curAudio.length / curSR;
  const pct = Math.min(el / dur, 1);
  $('waveCursor').style.left = (pct * $('waveCanvas').offsetWidth) + 'px';
  $('pTime').textContent = fmt(el) + ' / ' + fmt(dur);
  if (pct < 1) requestAnimationFrame(animCursor);
}

function fmt(s) { return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0'); }

function drawWave(data) {
  const c = $('waveCanvas'), ctx = c.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  c.width = c.offsetWidth * dpr; c.height = c.offsetHeight * dpr;
  ctx.scale(dpr, dpr);
  const w = c.offsetWidth, h = c.offsetHeight;
  ctx.clearRect(0, 0, w, h);
  const step = Math.ceil(data.length / w), mid = h / 2;
  ctx.fillStyle = '#00ffaa';
  for (let i = 0; i < w; i++) {
    let mn = 1, mx = -1;
    for (let j = 0; j < step; j++) { const v = data[i * step + j] || 0; if (v < mn) mn = v; if (v > mx) mx = v; }
    const top = (1 - mx) * mid, bot = (1 - mn) * mid;
    ctx.globalAlpha = 0.6 + Math.abs(mx - mn) * 0.4;
    ctx.fillRect(i, top, 1, Math.max(1, bot - top));
  }
  ctx.globalAlpha = 1;
}

$('waveWrap').onclick = (e) => {
  if (!curAudio) return;
  const r = $('waveCanvas').getBoundingClientRect();
  const pct = (e.clientX - r.left) / r.width;
  pausedAt = pct * (curAudio.length / curSR);
  if (playing) { srcNode.stop(); srcNode = null; playing = false; $('playBtn').click(); }
  else {
    $('waveCursor').style.left = (pct * $('waveCanvas').offsetWidth) + 'px';
    $('pTime').textContent = fmt(pausedAt) + ' / ' + fmt(curAudio.length / curSR);
  }
};

function toWav(f, sr) {
  const l = f.length, b = new ArrayBuffer(44 + l * 2), v = new DataView(b);
  const ws = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  ws(0, 'RIFF'); v.setUint32(4, 36 + l * 2, true); ws(8, 'WAVE'); ws(12, 'fmt ');
  v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
  v.setUint32(24, sr, true); v.setUint32(28, sr * 2, true); v.setUint16(32, 2, true);
  v.setUint16(34, 16, true); ws(36, 'data'); v.setUint32(40, l * 2, true);
  for (let i = 0; i < l; i++) {
    const s = Math.max(-1, Math.min(1, f[i]));
    v.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  return new Blob([b], { type: 'audio/wav' });
}

function dl(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = name; a.click();
  URL.revokeObjectURL(a.href);
}

$('dlBtn').onclick = () => { if (curAudio) dl(toWav(curAudio, curSR), 'maximus-' + Date.now() + '.wav'); };

$('saveBtn').onclick = () => {
  if (!curAudio) return;
  const name = $('prompt').value.trim().slice(0, 24) || 'Clip';
  clips.push({ name, data: curAudio.slice(), sr: curSR, dur: curAudio.length / curSR });
  renderLib();
};

function renderLib() {
  $('libCard').style.display = clips.length ? 'block' : 'none';
  $('stitchRow').style.display = clips.length >= 2 ? 'flex' : 'none';
  $('clipCount').textContent = '(' + clips.length + ')';
  $('clipsGrid').innerHTML = '';
  clips.forEach((c, i) => {
    const d = document.createElement('div'); d.className = 'clip';
    d.innerHTML = '<div class="clip-name">' + esc(c.name) + '</div><div class="clip-dur">' + c.dur.toFixed(1) + 's</div><button class="clip-del" data-i="' + i + '">✕</button>';
    d.onclick = (e) => {
      if (e.target.classList.contains('clip-del')) { clips.splice(parseInt(e.target.dataset.i), 1); renderLib(); return; }
      curAudio = c.data; curSR = c.sr; showPlayer(); drawWave(curAudio);
    };
    $('clipsGrid').appendChild(d);
  });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

$('stitchBtn').onclick = () => {
  if (clips.length < 2) return;
  const sr = clips[0].sr;
  const fade = Math.floor(0.3 * sr);
  let tl = clips.reduce((s, c) => s + c.data.length, 0) - (clips.length - 1) * fade;
  const out = new Float32Array(tl);
  let pos = 0;
  clips.forEach((c, i) => {
    for (let j = 0; j < c.data.length; j++) {
      let s = c.data[j];
      if (i > 0 && j < fade) s *= j / fade;
      if (i < clips.length - 1 && j >= c.data.length - fade) s *= (c.data.length - j) / fade;
      if (pos + j < out.length) out[pos + j] = (out[pos + j] || 0) + s;
    }
    pos += c.data.length - fade;
  });
  stitchedBuf = { data: out, sr };
  curAudio = out; curSR = sr;
  showPlayer(); drawWave(out);
  $('footStatus').textContent = 'Stitched ' + clips.length + ' clips → ' + (out.length / sr).toFixed(1) + 's track.';
};

$('dlStitchBtn').onclick = () => {
  if (stitchedBuf) dl(toWav(stitchedBuf.data, stitchedBuf.sr), 'maximus-stitched-' + Date.now() + '.wav');
};

window.addEventListener('resize', () => { if (curAudio) drawWave(curAudio); });
</script>
</body>
</html>
