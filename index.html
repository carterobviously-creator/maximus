<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maximus V2</title>
<style>
    body {
        background: #000;
        color: #00eaff;
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 40px;
    }
    h1 {
        font-size: 3rem;
        text-shadow: 0 0 15px #00eaff;
        margin-bottom: 20px;
    }
    #prompt, #length {
        padding: 12px;
        font-size: 1.1rem;
        border-radius: 10px;
        border: 2px solid #00eaff;
        background: #0a0a0a;
        color: #00eaff;
        outline: none;
        box-shadow: 0 0 10px #00eaff;
        margin: 5px;
    }
    #prompt {
        width: 60%;
    }
    #length {
        width: 120px;
    }
    button {
        background: #00eaff;
        border: none;
        padding: 15px 30px;
        margin: 15px;
        font-size: 1.2rem;
        cursor: pointer;
        border-radius: 8px;
        color: #000;
        font-weight: bold;
        box-shadow: 0 0 10px #00eaff;
    }
    canvas {
        width: 100%;
        height: 200px;
        background: #111;
        border: 2px solid #00eaff;
        margin-top: 20px;
        border-radius: 10px;
    }
</style>
</head>
<body>

<h1>Maximus V2</h1>

<input id="prompt" placeholder="Describe your track... (e.g. 'dnb with trap beat, dark pads, vocals')" />
<input id="length" type="number" min="10" max="600" placeholder="Length (sec)" />

<br>

<button id="generateBtn">Generate Track</button>

<canvas id="waveform"></canvas>

<audio id="player" controls></audio>

<button id="downloadBtn">Download WAV</button>

<script>
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let analyser = audioCtx.createAnalyser();
let bufferData = null;

const canvas = document.getElementById("waveform");
const ctx = canvas.getContext("2d");

function drawWaveform() {
    requestAnimationFrame(drawWaveform);

    let data = new Uint8Array(analyser.fftSize);
    analyser.getByteTimeDomainData(data);

    ctx.fillStyle = "#111";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.lineWidth = 2;
    ctx.strokeStyle = "#00eaff";
    ctx.beginPath();

    let slice = canvas.width / data.length;
    let x = 0;

    for (let i = 0; i < data.length; i++) {
        let v = data[i] / 128.0;
        let y = (v * canvas.height) / 2;

        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);

        x += slice;
    }

    ctx.stroke();
}

drawWaveform();

function parseStyle(promptText, lengthOverride) {
    promptText = promptText.toLowerCase();
    let style = {
        bpm: 120,
        trap: false,
        dnb: false,
        edm: false,
        ambient: false,
        hiphop: false,
        dark: promptText.includes("dark"),
        bright: promptText.includes("bright"),
        vocals: (promptText.includes("vocal") || promptText.includes("rap") || promptText.includes("singer")),
        lengthSeconds: 60
    };

    if (promptText.includes("dnb") || promptText.includes("drum and bass")) {
        style.dnb = true;
        style.bpm = 170;
    }
    if (promptText.includes("trap")) {
        style.trap = true;
        style.bpm = style.dnb ? 160 : 140;
    }
    if (promptText.includes("edm") || promptText.includes("house")) {
        style.edm = true;
        style.bpm = 128;
    }
    if (promptText.includes("ambient") || promptText.includes("chill")) {
        style.ambient = true;
        style.bpm = 80;
    }
    if (promptText.includes("hip hop") || promptText.includes("boom bap")) {
        style.hiphop = true;
        style.bpm = 90;
    }

    if (!style.trap && !style.dnb && !style.edm && !style.ambient && !style.hiphop) {
        style.bpm = 120;
    }

    if (promptText.includes("short")) style.lengthSeconds = 30;
    if (promptText.includes("long")) style.lengthSeconds = 120;
    if (promptText.includes("full song") || promptText.includes("full track")) style.lengthSeconds = 180;

    if (!isNaN(lengthOverride) && lengthOverride > 5 && lengthOverride <= 600) {
        style.lengthSeconds = lengthOverride;
    }

    return style;
}

function generateSong(promptText, lengthOverride) {
    const style = parseStyle(promptText, lengthOverride);
    const sampleRate = audioCtx.sampleRate;
    const duration = style.lengthSeconds;
    const frameCount = sampleRate * duration;

    let buffer = audioCtx.createBuffer(1, frameCount, sampleRate);
    let data = buffer.getChannelData(0);

    const bpm = style.bpm;
    const secondsPerBeat = 60 / bpm;
    const beatsPerBar = 4;
    const barLength = secondsPerBeat * beatsPerBar;

    for (let i = 0; i < frameCount; i++) {
        let t = i / sampleRate;
        let beat = t / secondsPerBeat;
        let bar = t / barLength;
        let beatInBar = beat % beatsPerBar;

        let drums = 0;
        let bass = 0;
        let synth = 0;
        let vocalLayer = 0;

        // DRUMS
        let kick = 0;
        let snare = 0;
        let hat = 0;

        if (style.dnb) {
            if (Math.abs(beatInBar - 0) < 0.05 || Math.abs(beatInBar - 1.5) < 0.05) {
                kick = Math.sin(2 * Math.PI * 60 * t) * Math.exp(- (t % secondsPerBeat) * 20);
            }
            if (Math.abs(beatInBar - 1) < 0.05 || Math.abs(beatInBar - 2.5) < 0.05) {
                snare = (Math.random() * 2 - 1) * 0.5 * Math.exp(- (t % secondsPerBeat) * 25);
            }
            if (Math.floor(beat * 4) % 2 === 0) {
                hat = (Math.random() * 2 - 1) * 0.15;
            }
        } else if (style.trap) {
            if (Math.abs(beatInBar - 0) < 0.05 || Math.abs(beatInBar - 2) < 0.05) {
                kick = Math.sin(2 * Math.PI * 50 * t) * Math.exp(- (t % secondsPerBeat) * 15);
            }
            if (Math.abs(beatInBar - 1) < 0.05 || Math.abs(beatInBar - 3) < 0.05) {
                snare = (Math.random() * 2 - 1) * 0.4 * Math.exp(- (t % secondsPerBeat) * 20);
            }
            if (Math.floor(beat * 8) % 2 === 0) {
                hat = (Math.random() * 2 - 1) * 0.12;
            }
        } else if (style.edm) {
            if (Math.abs(beatInBar - 0) < 0.05 || Math.abs(beatInBar - 1) < 0.05 ||
                Math.abs(beatInBar - 2) < 0.05 || Math.abs(beatInBar - 3) < 0.05) {
                kick = Math.sin(2 * Math.PI * 60 * t) * Math.exp(- (t % secondsPerBeat) * 18);
            }
            if (Math.abs(beatInBar - 1.5) < 0.05 || Math.abs(beatInBar - 3.5) < 0.05) {
                snare = (Math.random() * 2 - 1) * 0.35 * Math.exp(- (t % secondsPerBeat) * 20);
            }
            if (Math.floor(beat * 4) % 2 === 0) {
                hat = (Math.random() * 2 - 1) * 0.1;
            }
        } else if (style.ambient) {
            if (Math.abs(beatInBar - 0) < 0.05) {
                kick = Math.sin(2 * Math.PI * 40 * t) * Math.exp(- (t % secondsPerBeat) * 8);
            }
            if (Math.abs(beatInBar - 2) < 0.05) {
                snare = (Math.random() * 2 - 1) * 0.2 * Math.exp(- (t % secondsPerBeat) * 10);
            }
            if (Math.floor(beat * 2) % 2 === 0) {
                hat = (Math.random() * 2 - 1) * 0.05;
            }
        } else {
            if (Math.abs(beatInBar - 0) < 0.05 || Math.abs(beatInBar - 2) < 0.05) {
                kick = Math.sin(2 * Math.PI * 60 * t) * Math.exp(- (t % secondsPerBeat) * 15);
            }
            if (Math.abs(beatInBar - 1) < 0.05 || Math.abs(beatInBar - 3) < 0.05) {
                snare = (Math.random() * 2 - 1) * 0.3 * Math.exp(- (t % secondsPerBeat) * 18);
            }
            if (Math.floor(beat * 4) % 2 === 0) {
                hat = (Math.random() * 2 - 1) * 0.1;
            }
        }

        drums = kick + snare + hat;

        // BASS
        let baseFreq = 55;
        if (style.dnb) baseFreq = 80;
        if (style.trap) baseFreq = 45;
        if (style.edm) baseFreq = 60;
        if (style.ambient) baseFreq = 40;

        let bassEnv = Math.max(0, Math.sin(Math.PI * (beatInBar / beatsPerBar)));
        bass = Math.sin(2 * Math.PI * baseFreq * t) * bassEnv * 0.4;

        // SYNTH
        let synthFreq = style.bright ? 440 : 220;
        if (style.dark) synthFreq *= 0.75;
        if (style.ambient) synthFreq *= 0.5;

        let section = Math.floor(bar) % 4; // 0 intro, 1 verse, 2 chorus, 3 bridge
        let synthAmp = 0.0;
        if (section === 0) synthAmp = 0.2;
        if (section === 1) synthAmp = 0.3;
        if (section === 2) synthAmp = 0.5;
        if (section === 3) synthAmp = 0.35;

        synth = (Math.sin(2 * Math.PI * synthFreq * t) +
                 0.5 * Math.sin(2 * Math.PI * (synthFreq * 2) * t)) * synthAmp;

        // VOCAL-LIKE LAYER (simple vowel-ish lead when vocals requested)
        if (style.vocals && (section === 1 || section === 2)) {
            let phrasePos = (t % (barLength * 2)) / (barLength * 2); // 2-bar phrase
            let vowelFreq = 300 + 200 * Math.sin(phrasePos * Math.PI * 2);
            let formant1 = Math.sin(2 * Math.PI * vowelFreq * t);
            let formant2 = Math.sin(2 * Math.PI * (vowelFreq * 2.5) * t);
            let env = Math.max(0, Math.sin(Math.PI * phrasePos));
            vocalLayer = (formant1 * 0.4 + formant2 * 0.2) * env * 0.4;
        }

        let sample = drums + bass + synth + vocalLayer;
        sample *= 0.6;

        data[i] = sample;
    }

    bufferData = buffer;

    let source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    source.start();

    exportWAV(buffer, (blob) => {
        document.getElementById("player").src = URL.createObjectURL(blob);
    });
}

function exportWAV(buffer, callback) {
    let length = buffer.length;
    let sampleRate = buffer.sampleRate;
    let data = buffer.getChannelData(0);

    let wavBuffer = new ArrayBuffer(44 + length * 2);
    let view = new DataView(wavBuffer);

    function writeString(offset, str) {
        for (let i = 0; i < str.length; i++) {
            view.setUint8(offset + i, str.charCodeAt(i));
        }
    }

    writeString(0, "RIFF");
    view.setUint32(4, 36 + length * 2, true);
    writeString(8, "WAVE");
    writeString(12, "fmt ");
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, 1, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * 2, true);
    view.setUint16(32, 2, true);
    view.setUint16(34, 16, true);
    writeString(36, "data");
    view.setUint32(40, length * 2, true);

    let offset = 44;
    for (let i = 0; i < length; i++, offset += 2) {
        let s = Math.max(-1, Math.min(1, data[i]));
        view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    }

    callback(new Blob([view], { type: "audio/wav" }));
}

document.getElementById("generateBtn").onclick = () => {
    let promptText = document.getElementById("prompt").value || "";
    let lengthVal = parseFloat(document.getElementById("length").value);
    generateSong(promptText, lengthVal);
};

document.getElementById("downloadBtn").onclick = () => {
    if (!bufferData) return;
    exportWAV(bufferData, (blob) => {
        let a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "maximus_v2_track.wav";
        a.click();
    });
};
</script>

</body>
</html>
