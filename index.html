<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maximus V2</title>
<style>
    body {
        background: #000;
        color: #00eaff;
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 40px;
    }
    h1 {
        font-size: 3rem;
        text-shadow: 0 0 15px #00eaff;
        margin-bottom: 20px;
    }
    #prompt, #length {
        padding: 12px;
        font-size: 1.1rem;
        border-radius: 10px;
        border: 2px solid #00eaff;
        background: #0a0a0a;
        color: #00eaff;
        outline: none;
        box-shadow: 0 0 10px #00eaff;
        margin: 5px;
    }
    #prompt {
        width: 60%;
    }
    #length {
        width: 120px;
    }
    button {
        background: #00eaff;
        border: none;
        padding: 15px 30px;
        margin: 15px;
        font-size: 1.2rem;
        cursor: pointer;
        border-radius: 8px;
        color: #000;
        font-weight: bold;
        box-shadow: 0 0 10px #00eaff;
    }
    canvas {
        width: 100%;
        height: 200px;
        background: #111;
        border: 2px solid #00eaff;
        margin-top: 20px;
        border-radius: 10px;
    }
</style>
</head>
<body>

<h1>Maximus V2</h1>

<input id="prompt" placeholder="Describe your track... (e.g. 'dnb with trap beat, dark pads, vocals')" />
<input id="length" type="number" min="10" max="600" placeholder="Length (sec)" />

<br>

<button id="generateBtn">Generate Track</button>

<canvas id="waveform"></canvas>

<audio id="player" controls></audio>

<button id="downloadBtn">Download WAV</button>

<script>
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let analyser = audioCtx.createAnalyser();
let bufferData = null;

const canvas = document.getElementById("waveform");
const ctx = canvas.getContext("2d");

function drawWaveform() {
    requestAnimationFrame(drawWaveform);

    let data = new Uint8Array(analyser.fftSize || 2048);
    analyser.fftSize = 2048;
    analyser.getByteTimeDomainData(data);

    ctx.fillStyle = "#111";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.lineWidth = 2;
    ctx.strokeStyle = "#00eaff";
    ctx.beginPath();

    let slice = canvas.width / data.length;
    let x = 0;

    for (let i = 0; i < data.length; i++) {
        let v = data[i] / 128.0;
        let y = (v * canvas.height) / 2;

        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);

        x += slice;
    }

    ctx.stroke();
}

drawWaveform();

/* SMARTER MUSIC BRAIN */
function parseStyle(promptText, lengthOverride) {
    const text = (promptText || "").toLowerCase();

    const style = {
        genres: [],
        mood: "neutral",
        energy: "medium",
        instruments: [],
        vocals: false,
        structure: [],
        bpm: 120,
        lengthSeconds: 60
    };

    // GENRES (supports blends)
    const genreMap = {
        "trap": "trap",
        "dnb": "drum and bass",
        "drum and bass": "drum and bass",
        "edm": "edm",
        "house": "house",
        "ambient": "ambient",
        "chill": "ambient",
        "hip hop": "hip hop",
        "boom bap": "boom bap",
        "synthwave": "synthwave",
        "lofi": "lofi",
        "dubstep": "dubstep",
        "drill": "drill"
    };
    for (const key in genreMap) {
        if (text.includes(key)) style.genres.push(genreMap[key]);
    }
    if (style.genres.length === 0) style.genres.push("generic");

    // MOOD
    if (text.includes("dark")) style.mood = "dark";
    if (text.includes("bright")) style.mood = "bright";
    if (text.includes("sad")) style.mood = "sad";
    if (text.includes("happy")) style.mood = "happy";
    if (text.includes("cinematic")) style.mood = "cinematic";
    if (text.includes("dreamy")) style.mood = "dreamy";

    // ENERGY
    if (text.includes("high energy") || text.includes("hype") || text.includes("fast")) style.energy = "high";
    if (text.includes("low energy") || text.includes("chill") || text.includes("slow")) style.energy = "low";

    // INSTRUMENTS
    const instrumentKeywords = [
        "deep bass", "bass", "808", "reese", "sub",
        "pads", "pad", "lead", "melody", "synth", "bells", "piano", "keys", "atmospheric"
    ];
    instrumentKeywords.forEach(inst => {
        if (text.includes(inst)) style.instruments.push(inst);
    });

    // VOCALS
    if (text.includes("vocal") || text.includes("rap") || text.includes("singer") || text.includes("space for vocals"))
        style.vocals = true;

    // STRUCTURE
    const structureKeywords = ["intro", "build", "drop", "verse", "chorus", "hook", "outro", "bridge"];
    structureKeywords.forEach(part => {
        if (text.includes(part)) style.structure.push(part);
    });
    if (style.structure.length === 0) {
        style.structure = ["intro", "build", "drop", "verse", "chorus", "outro"];
    }

    // BPM from genres (blend-aware)
    function pickBpm(genres) {
        if (genres.includes("drum and bass")) return 170;
        if (genres.includes("dubstep")) return 140;
        if (genres.includes("trap") || genres.includes("drill")) return 140;
        if (genres.includes("edm") || genres.includes("house")) return 128;
        if (genres.includes("hip hop") || genres.includes("boom bap")) return 90;
        if (genres.includes("lofi")) return 80;
        if (genres.includes("ambient")) return 75;
        return 120;
    }
    style.bpm = pickBpm(style.genres);

    // ENERGY tweaks BPM slightly
    if (style.energy === "high") style.bpm += 5;
    if (style.energy === "low") style.bpm -= 5;

    // LENGTH: explicit override box
    if (!isNaN(lengthOverride) && lengthOverride > 5 && lengthOverride <= 600)
        style.lengthSeconds = lengthOverride;

    // NATURAL LANGUAGE LENGTH
    const lengthMatch = text.match(/(\d+)\s*(seconds|second|sec|minutes|minute|min)/);
    if (lengthMatch) {
        let num = parseInt(lengthMatch[1]);
        if (lengthMatch[2].includes("min")) num *= 60;
        style.lengthSeconds = Math.max(10, Math.min(num, 600));
    }

    // Keywords like "short", "long", "full song"
    if (text.includes("short")) style.lengthSeconds = 30;
    if (text.includes("long")) style.lengthSeconds = 120;
    if (text.includes("full song") || text.includes("full track")) style.lengthSeconds = 180;

    return style;
}

function generateSong(promptText, lengthOverride) {
    const style = parseStyle(promptText, lengthOverride);
    const sampleRate = audioCtx.sampleRate;
    const duration = style.lengthSeconds;
    const frameCount = sampleRate * duration;

    let buffer = audioCtx.createBuffer(1, frameCount, sampleRate);
    let data = buffer.getChannelData(0);

    const bpm = style.bpm;
    const secondsPerBeat = 60 / bpm;
    const beatsPerBar = 4;
    const barLength = secondsPerBeat * beatsPerBar;

    // Helper: check if genre is present
    const hasGenre = g => style.genres.includes(g);

    for (let i = 0; i < frameCount; i++) {
        let t = i / sampleRate;
        let beat = t / secondsPerBeat;
        let bar = t / barLength;
        let beatInBar = beat % beatsPerBar;

        let drums = 0;
        let bass = 0;
        let synth = 0;
        let vocalLayer = 0;

        // SECTION from structure (loop through structure array)
        let sectionIndex = Math.floor(bar / 4) % style.structure.length;
        let sectionName = style.structure[sectionIndex] || "section";

        // DRUMS
        let kick = 0;
        let snare = 0;
        let hat = 0;

        // Base patterns by genre blend
        if (hasGenre("drum and bass")) {
            if (Math.abs(beatInBar - 0) < 0.04 || Math.abs(beatInBar - 1.5) < 0.04) {
                kick = Math.sin(2 * Math.PI * 60 * t) * Math.exp(- (t % secondsPerBeat) * 22);
            }
            if (Math.abs(beatInBar - 1) < 0.04 || Math.abs(beatInBar - 2.5) < 0.04) {
                snare = (Math.random() * 2 - 1) * 0.5 * Math.exp(- (t % secondsPerBeat) * 26);
            }
            if (Math.floor(beat * 4) % 2 === 0) {
                hat = (Math.random() * 2 - 1) * 0.16;
            }
        }
        if (hasGenre("trap") || hasGenre("drill")) {
            if (Math.abs(beatInBar - 0) < 0.05 || Math.abs(beatInBar - 2) < 0.05) {
                kick += Math.sin(2 * Math.PI * 50 * t) * Math.exp(- (t % secondsPerBeat) * 18);
            }
            if (Math.abs(beatInBar - 1) < 0.05 || Math.abs(beatInBar - 3) < 0.05) {
                snare += (Math.random() * 2 - 1) * 0.4 * Math.exp(- (t % secondsPerBeat) * 22);
            }
            if (Math.floor(beat * 8) % 2 === 0) {
                hat += (Math.random() * 2 - 1) * 0.12;
            }
        }
        if (hasGenre("edm") || hasGenre("house")) {
            if (Math.abs(beatInBar - 0) < 0.05 || Math.abs(beatInBar - 1) < 0.05 ||
                Math.abs(beatInBar - 2) < 0.05 || Math.abs(beatInBar - 3) < 0.05) {
                kick += Math.sin(2 * Math.PI * 60 * t) * Math.exp(- (t % secondsPerBeat) * 18);
            }
            if (Math.abs(beatInBar - 1.5) < 0.05 || Math.abs(beatInBar - 3.5) < 0.05) {
                snare += (Math.random() * 2 - 1) * 0.35 * Math.exp(- (t % secondsPerBeat) * 20);
            }
            if (Math.floor(beat * 4) % 2 === 0) {
                hat += (Math.random() * 2 - 1) * 0.1;
            }
        }
        if (hasGenre("ambient") || hasGenre("lofi")) {
            if (Math.abs(beatInBar - 0) < 0.05) {
                kick += Math.sin(2 * Math.PI * 40 * t) * Math.exp(- (t % secondsPerBeat) * 8);
            }
            if (Math.abs(beatInBar - 2) < 0.05) {
                snare += (Math.random() * 2 - 1) * 0.2 * Math.exp(- (t % secondsPerBeat) * 10);
            }
            if (Math.floor(beat * 2) % 2 === 0) {
                hat += (Math.random() * 2 - 1) * 0.05;
            }
        }
        if (style.genres.includes("generic")) {
            if (Math.abs(beatInBar - 0) < 0.05 || Math.abs(beatInBar - 2) < 0.05) {
                kick += Math.sin(2 * Math.PI * 60 * t) * Math.exp(- (t % secondsPerBeat) * 15);
            }
            if (Math.abs(beatInBar - 1) < 0.05 || Math.abs(beatInBar - 3) < 0.05) {
                snare += (Math.random() * 2 - 1) * 0.3 * Math.exp(- (t % secondsPerBeat) * 18);
            }
            if (Math.floor(beat * 4) % 2 === 0) {
                hat += (Math.random() * 2 - 1) * 0.1;
            }
        }

        // Energy-based drum scaling
        let drumEnergy = 1.0;
        if (style.energy === "high") drumEnergy = 1.2;
        if (style.energy === "low") drumEnergy = 0.7;
        drums = (kick + snare + hat) * drumEnergy;

        // BASS
        let baseFreq = 55;
        if (hasGenre("drum and bass")) baseFreq = 80;
        if (hasGenre("trap") || hasGenre("drill")) baseFreq = 45;
        if (hasGenre("edm") || hasGenre("house")) baseFreq = 60;
        if (hasGenre("ambient") || hasGenre("lofi")) baseFreq = 40;
        if (style.mood === "dark") baseFreq *= 0.9;
        if (style.mood === "bright") baseFreq *= 1.05;

        let bassEnv = Math.max(0, Math.sin(Math.PI * (beatInBar / beatsPerBar)));
        // Simple "pattern" change by section
        let bassSectionMul = 1.0;
        if (sectionName.includes("intro")) bassSectionMul = 0.4;
        if (sectionName.includes("build")) bassSectionMul = 0.7;
        if (sectionName.includes("drop") || sectionName.includes("chorus")) bassSectionMul = 1.2;
        if (sectionName.includes("outro")) bassSectionMul = 0.5;

        bass = Math.sin(2 * Math.PI * baseFreq * t) * bassEnv * 0.4 * bassSectionMul;

        // SYNTH / MELODY
        let synthFreq = 220;
        if (style.mood === "bright" || style.mood === "cinematic") synthFreq = 440;
        if (style.mood === "dark") synthFreq = 180;
        if (hasGenre("synthwave")) synthFreq = 330;
        if (hasGenre("ambient") || style.mood === "dreamy") synthFreq *= 0.7;

        let synthAmp = 0.0;
        if (sectionName.includes("intro")) synthAmp = 0.2;
        else if (sectionName.includes("build")) synthAmp = 0.35;
        else if (sectionName.includes("drop") || sectionName.includes("chorus") || sectionName.includes("hook")) synthAmp = 0.6;
        else if (sectionName.includes("verse")) synthAmp = 0.4;
        else if (sectionName.includes("outro")) synthAmp = 0.25;
        else synthAmp = 0.35;

        // Slight melodic movement
        let melodicMod = 1 + 0.1 * Math.sin(2 * Math.PI * (t / (barLength * 4)));
        let f1 = synthFreq * melodicMod;
        let f2 = f1 * 2;
        synth = (Math.sin(2 * Math.PI * f1 * t) +
                 0.5 * Math.sin(2 * Math.PI * f2 * t)) * synthAmp;

        // VOCAL-LIKE LAYER
        if (style.vocals && (sectionName.includes("verse") || sectionName.includes("chorus") || sectionName.includes("hook"))) {
            let phrasePos = (t % (barLength * 4)) / (barLength * 4); // 4-bar phrase
            let vowelFreq = 300 + 200 * Math.sin(phrasePos * Math.PI * 2);
            let formant1 = Math.sin(2 * Math.PI * vowelFreq * t);
            let formant2 = Math.sin(2 * Math.PI * (vowelFreq * 2.5) * t);
            let env = Math.max(0, Math.sin(Math.PI * phrasePos));
            let vocalGain = (style.mood === "cinematic") ? 0.5 : 0.35;
            vocalLayer = (formant1 * 0.4 + formant2 * 0.2) * env * vocalGain;
        }

        // MIX
        let sample = drums + bass + synth + vocalLayer;
        sample *= 0.6;

        // Simple master "arc" over the whole track (emotional arc)
        let globalPos = i / frameCount;
        let arc = Math.sin(globalPos * Math.PI); // fade in/out
        sample *= 0.7 + 0.6 * arc;

        data[i] = sample;
    }

    bufferData = buffer;

    let source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    source.start();

    exportWAV(buffer, (blob) => {
        document.getElementById("player").src = URL.createObjectURL(blob);
    });
}

function exportWAV(buffer, callback) {
    let length = buffer.length;
    let sampleRate = buffer.sampleRate;
    let data = buffer.getChannelData(0);

    let wavBuffer = new ArrayBuffer(44 + length * 2);
    let view = new DataView(wavBuffer);

    function writeString(offset, str) {
        for (let i = 0; i < str.length; i++) {
            view.setUint8(offset + i, str.charCodeAt(i));
        }
    }

    writeString(0, "RIFF");
    view.setUint32(4, 36 + length * 2, true);
    writeString(8, "WAVE");
    writeString(12, "fmt ");
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, 1, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * 2, true);
    view.setUint16(32, 2, true);
    view.setUint16(34, 16, true);
    writeString(36, "data");
    view.setUint32(40, length * 2, true);

    let offset = 44;
    for (let i = 0; i < length; i++, offset += 2) {
        let s = Math.max(-1, Math.min(1, data[i]));
        view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    }

    callback(new Blob([view], { type: "audio/wav" }));
}

document.getElementById("generateBtn").onclick = () => {
    let promptText = document.getElementById("prompt").value || "";
    let lengthVal = parseFloat(document.getElementById("length").value);
    generateSong(promptText, lengthVal);
};

document.getElementById("downloadBtn").onclick = () => {
    if (!bufferData) return;
    exportWAV(bufferData, (blob) => {
        let a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "maximus_v2_track.wav";
        a.click();
    });
};
</script>

</body>
</html>
