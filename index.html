<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONIC PRO | Multi-Threaded Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Syncopate:wght@400;700&display=swap');
        
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #08080c;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        .header-font { font-family: 'Syncopate', sans-serif; }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
        }

        .neon-text {
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        .btn-primary {
            background: linear-gradient(90deg, #00f2ff, #bc13fe);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 700;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(188, 19, 254, 0.3);
        }

        .visual-bar {
            width: 6px;
            background: linear-gradient(to top, var(--neon-purple), var(--neon-blue));
            border-radius: 3px;
            transition: height 0.05s ease;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--neon-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        input[type=range] { accent-color: var(--neon-blue); }

        .queue-item { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col p-6 lg:p-10">

    <header class="flex justify-between items-center mb-10">
        <div class="flex flex-col">
            <h1 class="text-4xl header-font font-bold tracking-tighter neon-text">SONIC<span class="text-[#bc13fe]">PRO</span></h1>
            <div class="flex items-center gap-2 mt-1">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span>
                <span class="text-[10px] uppercase tracking-[0.5em] text-white/40">Worker Thread Enabled</span>
            </div>
        </div>
        
        <div class="flex gap-4">
            <button id="download-btn" onclick="exportWav()" class="hidden glass px-6 py-3 hover:bg-white/10 transition flex items-center gap-3">
                <i data-lucide="download" class="w-4 h-4 text-cyan-400"></i>
                <span class="text-xs font-bold uppercase tracking-widest text-white/80">Export WAV</span>
            </button>
            <button id="play-btn" onclick="togglePlayback()" disabled class="glass px-8 py-3 opacity-30 flex items-center gap-3 transition cursor-not-allowed">
                <i id="play-icon" data-lucide="play" class="w-4 h-4 fill-current"></i>
                <span id="play-text" class="text-xs font-bold uppercase tracking-widest">Wait for Sync</span>
            </button>
        </div>
    </header>

    <main class="flex-1 flex flex-col lg:flex-row gap-8 overflow-hidden">
        <aside class="w-full lg:w-[380px] flex flex-col gap-6 overflow-hidden">
            <div class="glass p-8 flex flex-col gap-6 shrink-0">
                <div>
                    <label class="text-[10px] font-bold uppercase text-cyan-400 tracking-widest mb-3 block">Neural Prompt</label>
                    <textarea id="prompt-input" class="w-full bg-black/40 border border-white/10 rounded-2xl p-5 text-sm h-24 resize-none focus:outline-none focus:border-cyan-500 transition leading-relaxed" placeholder="e.g. Melodic techno, high energy...">80s synthwave, analog bass, gated reverb</textarea>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-3">
                        <label class="text-[10px] font-bold uppercase text-cyan-400 tracking-widest">Target Duration</label>
                        <span id="length-display" class="text-[10px] font-bold text-white/60">60s</span>
                    </div>
                    <input type="range" id="duration-slider" min="10" max="120" step="10" value="60" oninput="updateLengthDisplay(this.value)" class="w-full h-1 bg-white/10 rounded-lg appearance-none cursor-pointer">
                </div>

                <button id="add-queue-btn" onclick="addToQueue()" class="btn-primary w-full py-4 rounded-2xl flex items-center justify-center gap-4">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i>
                    <span>Queue Track</span>
                </button>
            </div>

            <div class="glass flex-1 p-6 flex flex-col overflow-hidden">
                <div class="flex justify-between items-center mb-4">
                    <label class="text-[10px] font-bold uppercase text-white/40 tracking-widest">Queue</label>
                    <span id="queue-count" class="text-[10px] bg-white/10 px-2 py-0.5 rounded-full text-white/60">0</span>
                </div>
                <div id="queue-list" class="flex-1 overflow-y-auto space-y-3 pr-2">
                    <div class="text-center py-10 opacity-20 text-xs italic">System Ready</div>
                </div>
                <div id="batch-status" class="mt-4 pt-4 border-t border-white/5 hidden">
                    <div class="flex justify-between items-center mb-2">
                        <span id="status-text" class="text-[9px] uppercase tracking-widest text-cyan-400">Loading Weights...</span>
                        <div id="spinner" class="loading-spinner"></div>
                    </div>
                    <div class="w-full h-1 bg-white/5 rounded-full overflow-hidden">
                        <div id="progress-bar" class="h-full bg-cyan-400 w-0 transition-all duration-300"></div>
                    </div>
                </div>
            </div>
        </aside>

        <section class="flex-1 glass relative flex flex-col items-center justify-center p-12 overflow-hidden">
            <div id="viz-container" class="flex gap-2 h-48 items-end mb-16"></div>

            <div id="main-display" class="text-center transition-all duration-500 opacity-40">
                <h2 id="display-title" class="text-7xl font-bold header-font tracking-tighter italic uppercase">Standby</h2>
                <p id="display-subtitle" class="text-xs uppercase tracking-[0.8em] text-cyan-400 mt-6 font-bold">Background Worker Active</p>
                <div id="playhead-container" class="hidden mt-8 w-64 h-1 bg-white/10 mx-auto rounded-full overflow-hidden">
                    <div id="playhead" class="h-full bg-cyan-400 w-0"></div>
                </div>
            </div>
            
            <div id="completion-list" class="absolute bottom-8 left-8 right-8 flex gap-4 overflow-x-auto pb-4"></div>
        </section>
    </main>

    <script id="worker-script" type="text/plain">
        import { AutoTokenizer, MusicgenForConditionalGeneration, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0';
        
        env.allowLocalModels = false;
        let tokenizer, model;

        self.onmessage = async (e) => {
            const { task } = e.data;
            try {
                if (!model) {
                    tokenizer = await AutoTokenizer.from_pretrained('Xenova/musicgen-small');
                    model = await MusicgenForConditionalGeneration.from_pretrained('Xenova/musicgen-small', {
                        progress_callback: (p) => {
                            if (p.status === 'progress') self.postMessage({ type: 'progress', data: (p.loaded/p.total)*100 });
                        }
                    });
                }

                self.postMessage({ type: 'status', data: 'Rendering Audio...' });
                const inputs = tokenizer(task.prompt, { padding: true, truncation: true, return_tensors: 'pt' });
                const audio_values = await model.generate({
                    inputs: inputs.input_ids,
                    attention_mask: inputs.attention_mask,
                    max_new_tokens: 512, // Reduced for stability
                    do_sample: true
                });

                self.postMessage({ 
                    type: 'success', 
                    audio: audio_values.data,
                    sampleRate: model.config.audio_encoder.sampling_rate,
                    taskId: task.id
                });
            } catch (err) {
                self.postMessage({ type: 'error', data: err.message });
            }
        };
    </script>

    <script type="module">
        lucide.createIcons();

        let worker;
        let queue = [];
        let completedTracks = [];
        let isProcessing = false;
        let activeTrackIndex = -1;
        let audioCtx, analyser, currentSourceNode, isPlaying = false;

        // Initialize Web Worker
        const blob = new Blob([document.getElementById('worker-script').textContent], { type: 'text/javascript' });
        worker = new Worker(URL.createObjectURL(blob), { type: 'module' });

        worker.onmessage = (e) => {
            const { type, data, audio, sampleRate, taskId } = e.data;
            
            if (type === 'progress') {
                document.getElementById('progress-bar').style.width = data + '%';
            } else if (type === 'status') {
                document.getElementById('status-text').innerText = data;
            } else if (type === 'success') {
                handleGenerationSuccess(audio, sampleRate, taskId);
            } else if (type === 'error') {
                console.error("Worker Error:", data);
                isProcessing = false;
                processQueue();
            }
        };

        // UI bars
        const viz = document.getElementById('viz-container');
        for(let i=0; i<32; i++) {
            const bar = document.createElement('div');
            bar.className = 'visual-bar';
            bar.style.height = '8px';
            viz.appendChild(bar);
        }

        window.updateLengthDisplay = (val) => {
            document.getElementById('length-display').innerText = val + 's';
        };

        window.addToQueue = () => {
            const prompt = document.getElementById('prompt-input').value;
            if (!prompt) return;

            queue.push({
                id: Date.now(),
                prompt,
                duration: parseInt(document.getElementById('duration-slider').value),
                status: 'pending'
            });
            renderQueue();
            processQueue();
        };

        function renderQueue() {
            const list = document.getElementById('queue-list');
            document.getElementById('queue-count').innerText = queue.length;
            if (queue.length === 0) {
                list.innerHTML = `<div class="text-center py-10 opacity-20 text-xs italic">All tasks completed</div>`;
                return;
            }
            list.innerHTML = queue.map(item => `
                <div class="queue-item glass p-4 bg-white/5 border-white/10">
                    <p class="text-[10px] text-cyan-400 font-bold uppercase mb-1">${item.status}</p>
                    <p class="text-xs text-white/80 line-clamp-1">${item.prompt}</p>
                </div>
            `).join('');
        }

        function processQueue() {
            if (isProcessing || queue.length === 0) return;
            isProcessing = true;
            document.getElementById('batch-status').classList.remove('hidden');
            const task = queue[0];
            task.status = 'processing';
            renderQueue();
            worker.postMessage({ task });
        }

        async function handleGenerationSuccess(audioData, sampleRate, taskId) {
            const task = queue.find(t => t.id === taskId);
            if (!task) return;

            if (!audioCtx) audioCtx = new AudioContext();
            
            // Loop/Extend audio in background (this is fast)
            const stem = audioCtx.createBuffer(1, audioData.length, sampleRate);
            stem.getChannelData(0).set(audioData);

            const offline = new OfflineAudioContext(1, sampleRate * task.duration, sampleRate);
            const source = offline.createBufferSource();
            source.buffer = stem;
            source.loop = true;
            source.connect(offline.destination);
            source.start(0);
            
            task.buffer = await offline.startRendering();
            task.status = 'ready';
            
            completedTracks.push(task);
            queue = queue.filter(t => t.id !== taskId);
            
            renderQueue();
            renderCompleted();
            
            if (activeTrackIndex === -1) selectTrack(completedTracks.length - 1);
            
            isProcessing = false;
            processQueue();
        }

        function renderCompleted() {
            const container = document.getElementById('completion-list');
            container.innerHTML = completedTracks.map((t, idx) => `
                <button onclick="window.selectTrack(${idx})" class="glass shrink-0 p-4 min-w-[140px] border-white/10 hover:border-cyan-400 transition text-left group ${activeTrackIndex === idx ? 'border-cyan-500 bg-cyan-500/10' : ''}">
                    <span class="text-[8px] font-bold text-cyan-400 uppercase">Mastered</span>
                    <p class="text-[10px] text-white/80 line-clamp-1 font-bold">${t.prompt}</p>
                </button>
            `).join('');
        }

        window.selectTrack = (idx) => {
            activeTrackIndex = idx;
            const track = completedTracks[idx];
            document.getElementById('play-btn').disabled = false;
            document.getElementById('play-btn').classList.remove('opacity-30', 'cursor-not-allowed');
            document.getElementById('display-title').innerText = "Track Ready";
            document.getElementById('display-subtitle').innerText = track.prompt;
            document.getElementById('main-display').classList.remove('opacity-40');
            document.getElementById('playhead-container').classList.remove('hidden');
            document.getElementById('download-btn').classList.remove('hidden');
            renderCompleted();
        };

        window.togglePlayback = () => {
            if (activeTrackIndex === -1) return;
            const track = completedTracks[activeTrackIndex];

            if (isPlaying) {
                if (currentSourceNode) currentSourceNode.stop();
                isPlaying = false;
            } else {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                analyser = audioCtx.createAnalyser();
                currentSourceNode = audioCtx.createBufferSource();
                currentSourceNode.buffer = track.buffer;
                currentSourceNode.loop = true;
                currentSourceNode.connect(analyser);
                analyser.connect(audioCtx.destination);
                
                const startTime = audioCtx.currentTime;
                currentSourceNode.start(0);
                isPlaying = true;
                updateFrame(startTime, track.duration);
            }
            document.getElementById('play-icon').setAttribute('data-lucide', isPlaying ? 'square' : 'play');
            document.getElementById('play-text').innerText = isPlaying ? "Stop" : "Play";
            lucide.createIcons();
        };

        function updateFrame(startTime, duration) {
            if (!isPlaying) return;
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(data);
            document.querySelectorAll('.visual-bar').forEach((b, i) => {
                b.style.height = Math.max(8, (data[i*4]/255)*180) + 'px';
            });
            const progress = ((audioCtx.currentTime - startTime) % duration) / duration * 100;
            document.getElementById('playhead').style.width = progress + '%';
            requestAnimationFrame(() => updateFrame(startTime, duration));
        }

        window.exportWav = () => {
            if (activeTrackIndex === -1) return;
            const buffer = completedTracks[activeTrackIndex].buffer;
            const length = buffer.length * 2 + 44;
            const out = new ArrayBuffer(length);
            const view = new DataView(out);
            const writeS = (o, s) => { for(let i=0; i<s.length; i++) view.setUint8(o+i, s.charCodeAt(i)); };
            writeS(0, 'RIFF'); view.setUint32(4, length - 8, true); writeS(8, 'WAVE');
            writeS(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true);
            view.setUint16(22, 1, true); view.setUint32(24, buffer.sampleRate, true);
            view.setUint32(28, buffer.sampleRate * 2, true); view.setUint16(32, 2, true);
            view.setUint16(34, 16, true); writeS(36, 'data'); view.setUint32(40, length - 44, true);
            let offset = 44; const chan = buffer.getChannelData(0);
            for(let i=0; i<chan.length; i++, offset+=2) {
                let s = Math.max(-1, Math.min(1, chan[i]));
                view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([out], { type: 'audio/wav' }));
            link.download = `SONIC_PRO_${Date.now()}.wav`;
            link.click();
        };
    </script>
</body>
</html>
