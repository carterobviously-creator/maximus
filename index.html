<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maximus V2</title>
<style>
    body {
        background: #000;
        color: #00eaff;
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 40px;
    }
    h1 {
        font-size: 3rem;
        text-shadow: 0 0 15px #00eaff;
        margin-bottom: 20px;
    }
    #prompt, #length {
        padding: 12px;
        font-size: 1.1rem;
        border-radius: 10px;
        border: 2px solid #00eaff;
        background: #0a0a0a;
        color: #00eaff;
        outline: none;
        box-shadow: 0 0 10px #00eaff;
        margin: 5px;
    }
    #prompt {
        width: 60%;
    }
    #length {
        width: 120px;
    }
    button {
        background: #00eaff;
        border: none;
        padding: 15px 30px;
        margin: 15px;
        font-size: 1.2rem;
        cursor: pointer;
        border-radius: 8px;
        color: #000;
        font-weight: bold;
        box-shadow: 0 0 10px #00eaff;
    }
    canvas {
        width: 100%;
        height: 200px;
        background: #111;
        border: 2px solid #00eaff;
        margin-top: 20px;
        border-radius: 10px;
    }
</style>
</head>
<body>

<h1>Maximus V2</h1>

<input id="prompt" placeholder="Describe your track... (e.g. 'dnb with trap beat, dark pads, vocals')" />
<input id="length" type="number" min="10" max="600" placeholder="Length (sec)" />

<br>

<button id="generateBtn">Generate Track</button>

<canvas id="waveform"></canvas>

<audio id="player" controls></audio>

<button id="downloadBtn">Download WAV</button>

<script src="maximus-scheduler.js"></script>
<script src="maximus-recorder.ts"></script>
<script src="maximus-core.js"></script>

</body>
</html>
