<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Maximus Lite – AI Music Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      background: #05060a;
      color: #e5e7ff;
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #050816;
      border-radius: 16px;
      border: 1px solid #1f2937;
      padding: 20px 24px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 0 32px rgba(0, 0, 0, 0.7);
    }
    h1 {
      margin: 0 0 4px;
      font-size: 20px;
    }
    .sub {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 16px;
    }
    label {
      font-size: 13px;
      color: #9ca3af;
      display: block;
      margin-top: 10px;
      margin-bottom: 4px;
    }
    input[type="text"], select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #020617;
      color: #e5e7eb;
      font-size: 14px;
    }
    button {
      margin-top: 14px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    .status {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 10px;
      white-space: pre-line;
      min-height: 2.2em;
    }
    audio {
      width: 100%;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Maximus Lite</h1>
    <div class="sub">
      Browser‑native AI music generator using <strong>Xenova/musicgen-small</strong> via CDN, with GPU when available.
    </div>

    <label for="prompt">Prompt</label>
    <input id="prompt" type="text" placeholder="Dark synthwave with slow evolving pads" />

    <label for="duration">Duration</label>
    <select id="duration">
      <option value="10">10 seconds</option>
      <option value="30" selected>30 seconds</option>
      <option value="60">1 minute</option>
    </select>

    <button id="generateBtn">Generate track</button>
    <div id="status" class="status">Loading model…</div>

    <audio id="player" controls></audio>
  </div>

  <script type="module">
    import { pipeline } from "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3/dist/transformers.min.js";

    const statusEl = document.getElementById("status");
    const btn = document.getElementById("generateBtn");
    const player = document.getElementById("player");

    let pipe = null;
    let loading = false;

    function setStatus(msg) {
      statusEl.textContent = msg;
      console.log(msg);
    }

    async function loadPipeline() {
      if (pipe || loading) return;
      loading = true;
      setStatus("Loading Xenova/musicgen-small from CDN…");

      try {
        pipe = await pipeline("text-to-audio", "Xenova/musicgen-small", {
          device: "webgpu", // falls back internally if not available
        });
        setStatus("Model ready. Enter a prompt and generate a track.");
      } catch (err) {
        console.error(err);
        setStatus("Failed to load model: " + err);
      } finally {
        loading = false;
      }
    }

    function floatTo16BitPCM(float32Array) {
      const len = float32Array.length;
      const buffer = new ArrayBuffer(len * 2);
      const view = new DataView(buffer);
      let offset = 0;
      for (let i = 0; i < len; i++, offset += 2) {
        let s = Math.max(-1, Math.min(1, float32Array[i]));
        view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7fff, true);
      }
      return buffer;
    }

    function encodeWAV(samples, sampleRate) {
      const buffer = new ArrayBuffer(44 + samples.length * 2);
      const view = new DataView(buffer);

      function writeString(view, offset, string) {
        for (let i = 0; i < string.length; i++) {
          view.setUint8(offset + i, string.charCodeAt(i));
        }
      }

      const numChannels = 1;
      const bitsPerSample = 16;
      const byteRate = (sampleRate * numChannels * bitsPerSample) / 8;
      const blockAlign = (numChannels * bitsPerSample) / 8;

      writeString(view, 0, "RIFF");
      view.setUint32(4, 36 + samples.length * 2, true);
      writeString(view, 8, "WAVE");

      writeString(view, 12, "fmt ");
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, numChannels, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, byteRate, true);
      view.setUint16(32, blockAlign, true);
      view.setUint16(34, bitsPerSample, true);

      writeString(view, 36, "data");
      view.setUint32(40, samples.length * 2, true);

      const pcmBuffer = floatTo16BitPCM(samples);
      const pcmView = new DataView(pcmBuffer);
      for (let i = 0; i < pcmBuffer.byteLength; i++) {
        view.setUint8(44 + i, pcmView.getUint8(i));
      }

      return new Blob([view], { type: "audio/wav" });
    }

    async function generateTrack() {
      const promptInput = document.getElementById("prompt");
      const durationInput = document.getElementById("duration");

      const prompt = promptInput.value.trim() || "Ambient pads with slow evolving textures";
      const durationSec = parseInt(durationInput.value, 10);

      if (!pipe) {
        await loadPipeline();
        if (!pipe) return;
      }

      btn.disabled = true;
      setStatus("Generating audio… first run can be slow.");

      try {
        const result = await pipe(prompt, {
          max_new_tokens: Math.floor(durationSec * 50),
          do_sample: true,
        });

        const audioData = result[0].audio;
        const sampleRate = result[0].sampling_rate;

        const wavBlob = encodeWAV(audioData, sampleRate);
        const url = URL.createObjectURL(wavBlob);
        player.src = url;
        await player.play().catch(() => {});

        setStatus("Track generated.");
      } catch (err) {
        console.error(err);
        setStatus("Error during generation: " + err);
      } finally {
        btn.disabled = false;
      }
    }

    btn.addEventListener("click", generateTrack);

    // Preload model
    loadPipeline();
  </script>
</body>
</html>
