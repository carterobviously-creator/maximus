<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONIC PRO | Neural Music Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Syncopate:wght@400;700&display=swap');
        
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #08080c;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        .header-font { font-family: 'Syncopate', sans-serif; }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
        }

        .neon-text {
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        .btn-primary {
            background: linear-gradient(90deg, #00f2ff, #bc13fe);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 700;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(188, 19, 254, 0.3);
            filter: brightness(1.1);
        }

        .visual-bar {
            width: 6px;
            background: linear-gradient(to top, var(--neon-purple), var(--neon-blue));
            border-radius: 3px;
            transition: height 0.05s ease;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--neon-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
    </style>
</head>
<body class="flex flex-col p-6 lg:p-10">

    <header class="flex justify-between items-center mb-10">
        <div class="flex flex-col">
            <h1 class="text-4xl header-font font-bold tracking-tighter neon-text">SONIC<span class="text-[#bc13fe]">PRO</span></h1>
            <div class="flex items-center gap-2 mt-1">
                <span class="w-1.5 h-1.5 rounded-full bg-cyan-400 animate-pulse"></span>
                <span class="text-[10px] uppercase tracking-[0.5em] text-white/40">Neural Generation Core</span>
            </div>
        </div>
        
        <div class="flex gap-4">
            <button id="download-btn" onclick="exportWav()" class="hidden glass px-6 py-3 hover:bg-white/10 transition flex items-center gap-3">
                <i data-lucide="download" class="w-4 h-4 text-cyan-400"></i>
                <span class="text-xs font-bold uppercase tracking-widest">Master WAV</span>
            </button>
            <button id="play-btn" onclick="togglePlayback()" disabled class="glass px-8 py-3 opacity-30 flex items-center gap-3 transition cursor-not-allowed">
                <i id="play-icon" data-lucide="play" class="w-4 h-4 fill-current"></i>
                <span id="play-text" class="text-xs font-bold uppercase tracking-widest">Engine Empty</span>
            </button>
        </div>
    </header>

    <main class="flex-1 flex flex-col lg:flex-row gap-8 overflow-hidden">
        <aside class="w-full lg:w-[400px] flex flex-col gap-6">
            <div class="glass p-8 flex flex-col gap-8 flex-1">
                <div>
                    <label class="text-[10px] font-bold uppercase text-cyan-400 tracking-widest mb-4 block">1. Describe Music</label>
                    <textarea id="prompt-input" class="w-full bg-black/40 border border-white/10 rounded-2xl p-5 text-sm h-32 resize-none focus:outline-none focus:border-cyan-500 transition leading-relaxed" placeholder="e.g. 80s synthwave with analog pads and a driving bassline, 120bpm, neon atmosphere...">Cyberpunk cinematic dark synth, heavy analog bass, rhythmic digital textures, 100bpm, high fidelity</textarea>
                    <div class="flex flex-wrap gap-2 mt-3">
                        <button onclick="setExample('Hard techno beat with a heavy 909 kick, industrial warehouse vibe, dark, 140bpm')" class="text-[9px] px-2 py-1 bg-white/5 rounded border border-white/10 hover:border-cyan-400 text-white/60">Techno</button>
                        <button onclick="setExample('Uplifting house music with a groovy bassline and piano chords, 126bpm')" class="text-[9px] px-2 py-1 bg-white/5 rounded border border-white/10 hover:border-cyan-400 text-white/60">House</button>
                        <button onclick="setExample('Lofi hip hop drum beat with a dusty jazz piano melody, vinyl crackle, 90bpm')" class="text-[9px] px-2 py-1 bg-white/5 rounded border border-white/10 hover:border-cyan-400 text-white/60">Lofi</button>
                    </div>
                </div>

                <div class="flex-1">
                    <label class="text-[10px] font-bold uppercase text-cyan-400 tracking-widest mb-4 block">2. Model Status</label>
                    <div id="status-box" class="bg-black/20 rounded-xl p-4 border border-white/5 space-y-3">
                        <div class="flex justify-between items-center">
                            <span id="status-text" class="text-[9px] uppercase tracking-widest text-white/40">Ready to Load</span>
                            <div id="spinner" class="loading-spinner hidden"></div>
                        </div>
                        <div id="progress-container" class="hidden w-full h-1 bg-white/5 rounded-full overflow-hidden">
                            <div id="progress-bar" class="h-full bg-cyan-400 w-0 transition-all duration-300"></div>
                        </div>
                    </div>
                </div>

                <div class="pt-6">
                    <button id="gen-btn" onclick="generate()" class="btn-primary w-full py-6 rounded-2xl flex items-center justify-center gap-4">
                        <span id="gen-text">Generate Music</span>
                    </button>
                    <p class="text-[9px] text-center mt-4 text-white/20 uppercase tracking-widest italic">Note: Full generation (~10s) takes 2-4 minutes on most browsers.</p>
                </div>
            </div>
        </aside>

        <section class="flex-1 glass relative flex flex-col items-center justify-center p-12 overflow-hidden">
            <div id="viz-container" class="flex gap-2 h-64 items-end mb-16"></div>

            <div id="main-display" class="text-center transition-all duration-500 opacity-40">
                <h2 id="display-title" class="text-7xl font-bold header-font tracking-tighter italic uppercase">Standby</h2>
                <p id="display-subtitle" class="text-xs uppercase tracking-[0.8em] text-cyan-400 mt-6 font-bold">Neural Engine Offline</p>
            </div>
        </section>
    </main>

    <script type="module">
        import { 
            AutoTokenizer, 
            MusicgenForConditionalGeneration, 
            env 
        } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0';

        lucide.createIcons();

        // Environment Config
        env.allowLocalModels = false;
        env.useBrowserCache = true;
        
        let tokenizer = null;
        let model = null;
        let audioCtx, analyser, masterBuffer, sourceNode, isPlaying = false;

        // Visualizer Setup
        const viz = document.getElementById('viz-container');
        for(let i=0; i<32; i++) {
            const bar = document.createElement('div');
            bar.className = 'visual-bar';
            bar.style.height = '12px';
            viz.appendChild(bar);
        }

        window.setExample = (val) => {
            document.getElementById('prompt-input').value = val;
        };

        window.generate = async () => {
            const prompt = document.getElementById('prompt-input').value;
            if (!prompt) return;

            const genBtn = document.getElementById('gen-btn');
            const statusText = document.getElementById('status-text');
            const subTitle = document.getElementById('display-subtitle');
            
            genBtn.disabled = true;
            document.getElementById('spinner').classList.remove('hidden');
            document.getElementById('display-title').innerText = "Synthesizing";
            
            try {
                if (!model || !tokenizer) {
                    statusText.innerText = "Loading AI Core...";
                    tokenizer = await AutoTokenizer.from_pretrained('Xenova/musicgen-small');
                    
                    statusText.innerText = "Downloading Neural Weights...";
                    model = await MusicgenForConditionalGeneration.from_pretrained('Xenova/musicgen-small', {
                        progress_callback: (p) => {
                            if (p.status === 'progress') {
                                document.getElementById('progress-container').classList.remove('hidden');
                                const pct = (p.loaded / p.total) * 100;
                                document.getElementById('progress-bar').style.width = pct + '%';
                                statusText.innerText = `Loading Weights: ${Math.round(pct)}%`;
                            }
                        }
                    });
                }

                statusText.innerText = "Inference Running (Large Buffer)...";
                subTitle.innerText = "This will take a moment - Rendering actual beats...";

                // Tokenize text prompt
                const inputs = tokenizer(prompt, { padding: true, truncation: true, return_tensors: 'pt' });

                // Generate audio tokens
                // CHANGED: max_new_tokens increased from 150 to 1000 (~10-15 seconds of audio)
                // CHANGED: guidance_scale added to make the model follow the prompt more strictly
                const audio_values = await model.generate({
                    inputs: inputs.input_ids,
                    attention_mask: inputs.attention_mask,
                    max_new_tokens: 1000, 
                    do_sample: true,
                    guidance_scale: 3.5
                });

                // Decode audio values
                const audioData = audio_values.data;
                const samplingRate = model.config.audio_encoder.sampling_rate;

                finalizeAudio(audioData, samplingRate);

            } catch (err) {
                console.error("Neural Error Detail:", err);
                statusText.innerText = "Generation Failed.";
                subTitle.innerText = "Error: " + err.message;
                resetUI();
            }
        };

        function finalizeAudio(audioData, rate) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            const raw = new Float32Array(audioData);
            masterBuffer = audioCtx.createBuffer(1, raw.length, rate);
            masterBuffer.getChannelData(0).set(raw);

            document.getElementById('gen-btn').disabled = false;
            document.getElementById('spinner').classList.add('hidden');
            document.getElementById('play-btn').disabled = false;
            document.getElementById('play-btn').classList.remove('opacity-30', 'cursor-not-allowed');
            document.getElementById('display-title').innerText = "Track Finalized";
            document.getElementById('main-display').classList.remove('opacity-40');
            document.getElementById('play-text').innerText = "Play Arrangement";
            document.getElementById('download-btn').classList.remove('hidden');
            document.getElementById('status-text').innerText = "Inference Successful";
            document.getElementById('progress-container').classList.add('hidden');
            document.getElementById('display-subtitle').innerText = "Audio Master Ready";
        }

        function resetUI() {
            document.getElementById('gen-btn').disabled = false;
            document.getElementById('spinner').classList.add('hidden');
            document.getElementById('display-title').innerText = "Idle";
            document.getElementById('progress-container').classList.add('hidden');
        }

        window.togglePlayback = () => {
            if (isPlaying) {
                if (sourceNode) sourceNode.stop();
                isPlaying = false;
            } else {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                analyser = audioCtx.createAnalyser();
                sourceNode = audioCtx.createBufferSource();
                sourceNode.buffer = masterBuffer;
                sourceNode.loop = true;
                sourceNode.connect(analyser);
                analyser.connect(audioCtx.destination);
                sourceNode.start(0);
                isPlaying = true;
                updateFrame();
            }
            document.getElementById('play-icon').setAttribute('data-lucide', isPlaying ? 'square' : 'play');
            document.getElementById('play-text').innerText = isPlaying ? "Stop Audio" : "Play Arrangement";
            lucide.createIcons();
        };

        function updateFrame() {
            if (!isPlaying) return;
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(data);
            document.querySelectorAll('.visual-bar').forEach((b, i) => {
                const val = (data[i * 4] / 255) * 240;
                b.style.height = Math.max(8, val) + 'px';
            });
            requestAnimationFrame(updateFrame);
        }

        window.exportWav = () => {
            const buffer = masterBuffer;
            const length = buffer.length * 2 + 44;
            const out = new ArrayBuffer(length);
            const view = new DataView(out);
            const writeS = (o, s) => { for(let i=0; i<s.length; i++) view.setUint8(o+i, s.charCodeAt(i)); };
            writeS(0, 'RIFF'); view.setUint32(4, length - 8, true); writeS(8, 'WAVE');
            writeS(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true);
            view.setUint16(22, 1, true); view.setUint32(24, buffer.sampleRate, true);
            view.setUint32(28, buffer.sampleRate * 2, true); view.setUint16(32, 2, true);
            view.setUint16(34, 16, true); writeS(36, 'data'); view.setUint32(40, length - 44, true);
            let offset = 44; const chan = buffer.getChannelData(0);
            for(let i=0; i<chan.length; i++, offset+=2) {
                let s = Math.max(-1, Math.min(1, chan[i]));
                view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([out], { type: 'audio/wav' }));
            link.download = "SONIC_PRO_MASTER.wav";
            link.click();
        };
    </script>
</body>
