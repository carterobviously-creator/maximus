<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Pro Audio Studio</title>
    <style>
        :root {
            --background: #0a0a0f;
            --primary-neon: #00f2ff;
            --secondary-neon: #bc13fe;
            --font-family: 'Inter', 'JetBrains Mono', sans-serif;
        }

        body {
            background-color: var(--background);
            color: white;
            font-family: var(--font-family);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: row;
            width: 100%;
            height: 100%;
        }

        .sidebar {
            width: 350px;
            background-color: #1a1a24;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            border-right: 1px solid var(--secondary-neon);
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--primary-neon);
            text-shadow: 0 0 5px var(--primary-neon);
            margin: 0;
        }

        textarea {
            width: 100%;
            height: 150px;
            background-color: #2a2a34;
            border: 1px solid var(--primary-neon);
            border-radius: 5px;
            color: white;
            font-family: var(--font-family);
            padding: 1rem;
            resize: none;
            box-sizing: border-box;
        }

        button {
            background-color: var(--primary-neon);
            color: var(--background);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
        }

        button:hover {
            box-shadow: 0 0 15px var(--primary-neon);
        }

        button:disabled {
            background-color: #555;
            cursor: not-allowed;
            box-shadow: none;
        }

        .playback-controls {
            display: flex;
            gap: 1rem;
        }

        .progress-bar {
            width: 100%;
            height: 5px;
            background-color: #2a2a34;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 1rem;
        }

        .progress-playhead {
            width: 0;
            height: 100%;
            background-color: var(--primary-neon);
        }

        #visualizer {
            width: 100%;
            height: 100%;
            border-radius: 5px;
        }
        
        .loader {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .loader.active {
            display: block;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid var(--secondary-neon);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Sonic Pro</h1>
            <textarea id="prompt" placeholder="Describe the audio you want to generate..."></textarea>
            <div class="playback-controls">
                <button id="generate-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 12 2-2 2 2"/><path d="m12 10 2 2-2 2"/><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 2-2"/></svg>
                    Generate
                </button>
                <button id="play-btn" disabled>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    Play
                </button>
                 <button id="stop-btn" disabled>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12"></rect></svg>
                    Stop
                </button>
            </div>
             <button id="export-btn" disabled>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Export WAV
            </button>
            <div class="progress-bar">
                <div id="playhead" class="progress-playhead"></div>
            </div>
             <div id="status" class="status-text">Ready.</div>
        </div>
        <div class="main-content">
            <canvas id="visualizer"></canvas>
        </div>
    </div>
    <div id="loader" class="loader">
        <p id="loader-text">Loading...</p>
    </div>

    <script type="module">
        const generateBtn = document.getElementById('generate-btn');
        const playBtn = document.getElementById('play-btn');
        const stopBtn = document.getElementById('stop-btn');
        const exportBtn = document.getElementById('export-btn');
        const promptEl = document.getElementById('prompt');
        const playhead = document.getElementById('playhead');
        const statusEl = document.getElementById('status');
        const visualizerCanvas = document.getElementById('visualizer');
        const loader = document.getElementById('loader');
        const loaderText = document.getElementById('loader-text');

        let audioBuffer = null;
        let audioContext, audioSource, analyser;
        let animationFrameId;

        const worker = new Worker(URL.createObjectURL(new Blob([`
            import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.16.0';
            
            env.allowLocalModels = false;
            let generator;

            self.onmessage = async (event) => {
                const { type, data } = event.data;

                if (type === 'init') {
                    try {
                        self.postMessage({ type: 'status', data: 'Initializing WebGPU...' });
                        await env.set('execution-providers', ['webgpu']);
                        self.postMessage({ type: 'status', data: 'Loading model...' });
                        generator = await pipeline('audio-generation', 'onnx-community/musicgen-small', {
                             device: 'webgpu',
                             dtype: 'fp16',
                             progress_callback: (progress) => {
                                self.postMessage({ type: 'progress', data: progress });
                            }
                        });
                        self.postMessage({ type: 'ready' });
                    } catch (error) {
                        self.postMessage({ type: 'error', data: 'Failed to initialize: ' + error.message });
                    }
                } else if (type === 'generate') {
                    self.postMessage({ type: 'status', data: 'Generating audio...' });
                    try {
                        const output = await generator(data.prompt, {
                            max_new_tokens: 512,
                        });
                        self.postMessage({ type: 'generationComplete', data: output.audio });
                    } catch (error) {
                        self.postMessage({ type: 'error', data: 'Generation failed: ' + error.message });
                    }
                }
            };
        `], { type: 'application/javascript' })));
        
        worker.onmessage = (event) => {
            const { type, data } = event.data;
            switch(type) {
                case 'status':
                    showLoader(data);
                    break;
                case 'progress':
                    if (data.file) {
                       showLoader(\`Loading: \${data.file} (\${(data.progress || 0).toFixed(2)}%)\`);
                    }
                    break;
                case 'ready':
                    hideLoader();
                    generateBtn.disabled = false;
                    statusEl.textContent = 'Ready to generate.';
                    break;
                case 'generationComplete':
                    hideLoader();
                    audioBuffer = data;
                    playBtn.disabled = false;
                    exportBtn.disabled = false;
                    statusEl.textContent = 'Generation complete!';
                    break;
                case 'error':
                    hideLoader();
                    statusEl.textContent = data;
                    alert(data);
                    break;
            }
        };

        function showLoader(text) {
            loader.classList.add('active');
            loaderText.textContent = text;
        }

        function hideLoader() {
            loader.classList.remove('active');
        }

        generateBtn.addEventListener('click', () => {
            if (!promptEl.value) {
                alert('Please enter a prompt.');
                return;
            }
            generateBtn.disabled = true;
            playBtn.disabled = true;
            stopBtn.disabled = true;
            exportBtn.disabled = true;
            worker.postMessage({ type: 'generate', data: { prompt: promptEl.value } });
        });

        playBtn.addEventListener('click', () => {
            if (audioBuffer) {
                if (audioContext && audioContext.state === 'running') {
                    audioContext.suspend();
                    playBtn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg> Play';
                } else if (audioContext) {
                    audioContext.resume();
                    playBtn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg> Pause';
                    visualize();
                } else {
                    playAudio(audioBuffer);
                }
            }
        });

        stopBtn.addEventListener('click', () => {
            if (audioSource) {
                audioSource.stop();
            }
            if (audioContext) {
                audioContext.close().then(() => {
                    audioContext = null;
                    audioSource = null;
                    cancelAnimationFrame(animationFrameId);
                    playhead.style.width = '0%';
                    playBtn.disabled = false;
                    stopBtn.disabled = true;
                     playBtn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg> Play';
                });
            }
        });
        
        exportBtn.addEventListener('click', () => {
            if (audioBuffer) {
                const wavBuffer = float32To16BitPCM(audioBuffer);
                const blob = new Blob([wavBuffer], { type: 'audio/wav' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'generated-audio.wav';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
        });

        function playAudio(float32Array) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const buffer = audioContext.createBuffer(1, float32Array.length, audioContext.sampleRate);
            buffer.getChannelData(0).set(float32Array);

            audioSource = audioContext.createBufferSource();
            audioSource.buffer = buffer;

            analyser = audioContext.createAnalyser();
            analyser.fftSize = 2048;

            audioSource.connect(analyser);
            analyser.connect(audioContext.destination);

            audioSource.start(0);
            playBtn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg> Pause';
            stopBtn.disabled = false;
            
            audioSource.onended = () => {
                 if (audioContext && audioContext.state !== 'closed') {
                    stopBtn.click();
                }
            };

            visualize();
            updatePlayhead();
        }

        function visualize() {
            const canvasCtx = visualizerCanvas.getContext('2d');
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            
            canvasCtx.clearRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);

            function draw() {
                if(!audioContext || audioContext.state !== 'running') {
                    cancelAnimationFrame(animationFrameId);
                    return;
                }

                animationFrameId = requestAnimationFrame(draw);
                analyser.getByteFrequencyData(dataArray);

                canvasCtx.fillStyle = 'rgb(10, 10, 15)';
                canvasCtx.fillRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);

                const barWidth = (visualizerCanvas.width / bufferLength) * 2.5;
                let barHeight;
                let x = 0;

                const gradient = canvasCtx.createLinearGradient(0, 0, 0, visualizerCanvas.height);
                gradient.addColorStop(0, 'rgb(188, 19, 254)');
                gradient.addColorStop(1, 'rgb(0, 242, 255)');


                for(let i = 0; i < bufferLength; i++) {
                    barHeight = dataArray[i];

                    canvasCtx.fillStyle = gradient;
                    canvasCtx.fillRect(x, visualizerCanvas.height - barHeight / 2, barWidth, barHeight / 2);

                    x += barWidth + 1;
                }
            }
            draw();
        }

        function updatePlayhead() {
            if (!audioContext || !audioSource || audioContext.state !== 'running') {
                return;
            }
            const progress = (audioContext.currentTime / audioSource.buffer.duration) * 100;
            playhead.style.width = \`\${progress}%\`;
            requestAnimationFrame(updatePlayhead);
        }

        function float32To16BitPCM(input) {
            const output = new DataView(new ArrayBuffer(44 + input.length * 2));
            // WAV header
            output.setUint32(0, 0x46464952, false); // "RIFF"
            output.setUint32(4, 36 + input.length * 2, true);
            output.setUint32(8, 0x45564157, false); // "WAVE"
            output.setUint32(12, 0x20746d66, false); // "fmt "
            output.setUint32(16, 16, true); // PCM chunk size
            output.setUint16(20, 1, true); // Audio format 1=PCM
            output.setUint16(22, 1, true); // Number of channels
            output.setUint32(24, 24000, true); // Sample rate
            output.setUint32(28, 24000 * 2, true); // Byte rate
            output.setUint16(32, 2, true); // Block align
            output.setUint16(34, 16, true); // Bits per sample
            output.setUint32(36, 0x61746164, false); // "data"
            output.setUint32(40, input.length * 2, true);

            // PCM data
            for (let i = 0; i < input.length; i++) {
                const s = Math.max(-1, Math.min(1, input[i]));
                output.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }
            return output.buffer;
        }

        // Initial check
        if (!('gpu' in navigator)) {
            statusEl.textContent = 'WebGPU not supported. This application requires a browser with WebGPU support.';
            generateBtn.disabled = true;
            alert('WebGPU not supported. Please use a modern browser like Chrome or Edge.');
        } else {
             worker.postMessage({ type: 'init' });
             generateBtn.disabled = true;
        }

    </script>
</body>
</html>
