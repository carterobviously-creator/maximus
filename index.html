<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Maximus Lite</title>
  <style>
    body { background: #0a0a0f; color: #e0e0e0; font-family: monospace; padding: 2rem; }
    h1 { color: #00ffaa; }
    input, button { font-size: 1.1rem; padding: 0.5rem 1rem; margin: 0.5rem 0; }
    input { width: 400px; background: #1a1a2e; color: #fff; border: 1px solid #00ffaa; }
    button { background: #00ffaa; color: #0a0a0f; border: none; cursor: pointer; }
    button:disabled { opacity: 0.4; cursor: wait; }
    #status { color: #888; margin-top: 1rem; white-space: pre-line; }
    audio { margin-top: 1rem; display: block; }
  </style>
</head>
<body>
  <h1>⚡ Maximus Lite</h1>
  <p>Browser-only music generator — no servers, no Python, no Node.</p>
  <input id="prompt" type="text" placeholder="chill lo-fi beat, 90 bpm" />
  <br>
  <button id="generate" onclick="generate()">Generate Music</button>
  <div id="status">Ready. First run downloads ~458 MB model (cached after).</div>
  <audio id="player" controls style="display:none"></audio>

  <script type="module">
    import { AutoTokenizer, MusicgenForConditionalGeneration } from
      'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3';

    let tokenizer, model, loaded = false;
    const status = document.getElementById('status');
    const btn = document.getElementById('generate');

    async function loadModel() {
      status.textContent = 'Loading model (~458 MB first time, cached after)...';
      tokenizer = await AutoTokenizer.from_pretrained('Xenova/musicgen-small');
      model = await MusicgenForConditionalGeneration.from_pretrained(
        'Xenova/musicgen-small',
        {
          dtype: {
            text_encoder: 'q4f16',
            decoder_model_merged: 'q4',
            encodec_decode: 'q4f16',
          },
        }
      );
      loaded = true;
      status.textContent = 'Model loaded. Ready to generate.';
    }

    window.generate = async function() {
      btn.disabled = true;
      try {
        if (!loaded) await loadModel();

        const prompt = document.getElementById('prompt').value || 'chill lo-fi beat';
        status.textContent = 'Generating audio... (30-120 sec)';

        const inputs = tokenizer(prompt);
        const audio_values = await model.generate({
          ...inputs,
          max_new_tokens: 500,
          do_sample: true,
          guidance_scale: 3,
        });

        // Convert to WAV and play
        const sampleRate = model.config.audio_encoder.sampling_rate;
        const audioData = audio_values.data;
        const wavBlob = float32ToWav(audioData, sampleRate);
        const url = URL.createObjectURL(wavBlob);

        const player = document.getElementById('player');
        player.src = url;
        player.style.display = 'block';
        player.play();
        status.textContent = 'Done! Playing audio.';
      } catch (e) {
        status.textContent = 'Error: ' + e.message;
        console.error(e);
      }
      btn.disabled = false;
    };

    function float32ToWav(float32Array, sampleRate) {
      const buffer = new ArrayBuffer(44 + float32Array.length * 2);
      const view = new DataView(buffer);
      const writeStr = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
      writeStr(0, 'RIFF');
      view.setUint32(4, 36 + float32Array.length * 2, true);
      writeStr(8, 'WAVE');
      writeStr(12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      writeStr(36, 'data');
      view.setUint32(40, float32Array.length * 2, true);
      for (let i = 0; i < float32Array.length; i++) {
        const s = Math.max(-1, Math.min(1, float32Array[i]));
        view.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      }
      return new Blob([buffer], { type: 'audio/wav' });
    }
  </script>
</body>
</html>
